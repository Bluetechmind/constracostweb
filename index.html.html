document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

waLink }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; gap:10px; background:#f59e0b; color:#0b1220; text-decoration:none; font-weight:700; font-size:15px; padding:15px 28px; border-radius:10px;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:#0b1220;\"><\u002Fspan>\n          Escríbeme por WhatsApp\n        <\u002Fa>\n        <a href=\"#como-funciona\" style=\"background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:#eef2f8; text-decoration:none; font-weight:600; font-size:15px; padding:15px 24px; border-radius:10px;\">Ver cómo funciona<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:16px;\">\n      <image-slot id=\"cc-hero-shot\" style=\"width:100%; height:420px;\" shape=\"rounded\" radius=\"20\" placeholder=\"Captura del panel de ConstraCost\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAIN POINTS -->\n  <div style=\"border-top:1px solid rgba(255,255,255,0.06); border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:36px 48px; display:grid; grid-template-columns:repeat(3,1fr); gap:32px;\">\n      <sc-for list=\"{{ pains }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n          <div style=\"font-size:20px;\">{{ p.emoji }}<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.55; color:#c3cadb;\">{{ p.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FLUJO / COMO FUNCIONA -->\n  <div id=\"como-funciona\" data-screen-label=\"como-funciona\" style=\"max-width:1280px; margin:0 auto; padding:72px 48px;\">\n    <div style=\"max-width:640px; margin-bottom:48px;\">\n      <div style=\"font-size:13px; font-weight:700; color:#f59e0b; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;\">Cómo funciona<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:32px; font-weight:700; color:#fff; margin:0 0 12px; letter-spacing:-0.01em;\">Un único flujo, de la obra a los resultados<\u002Fh2>\n      <p style=\"font-size:15.5px; color:#8592a8; line-height:1.6; margin:0;\">Cada paso alimenta automáticamente al siguiente. Sin exportar, sin duplicar, sin descuadres.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:stretch; gap:0; flex-wrap:wrap;\">\n      <sc-for list=\"{{ flow }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex; align-items:center;\">\n          <div style=\"width:186px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:22px 18px; text-align:left;\">\n            <div style=\"width:38px; height:38px; border-radius:10px; background:rgba(245,158,11,0.15); display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:16px;\">{{ f.emoji }}<\u002Fdiv>\n            <div style=\"font-size:14.5px; font-weight:700; color:#fff; margin-bottom:6px;\">{{ f.title }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; line-height:1.5; color:#8592a8;\">{{ f.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ f.hasArrow }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"width:32px; text-align:center; color:#f59e0b; font-size:20px; animation:flowPulse 2s infinite;\">→<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FUNCIONALIDADES -->\n  <div id=\"funcionalidades\" data-screen-label=\"funcionalidades\" style=\"background:rgba(255,255,255,0.02); border-top:1px solid rgba(255,255,255,0.06); border-bottom:1px solid rgba(255,255,255,0.06);\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:72px 48px;\">\n      <div style=\"max-width:640px; margin-bottom:48px;\">\n        <div style=\"font-size:13px; font-weight:700; color:#f59e0b; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;\">Funcionalidades<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:32px; font-weight:700; color:#fff; margin:0 0 12px; letter-spacing:-0.01em;\">Todo lo que necesita una PYME de construcción<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px;\">\n        <sc-for list=\"{{ features }}\" as=\"ft\" hint-placeholder-count=\"4\">\n          <div style=\"background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:28px;\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; color:#fff; margin:0 0 10px;\">{{ ft.title }}<\u002Fh3>\n            <p style=\"font-size:14.5px; line-height:1.65; color:#8592a8; margin:0;\">{{ ft.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- QUIEN LO HACE -->\n  <div id=\"quien\" data-screen-label=\"quien\" style=\"max-width:900px; margin:0 auto; padding:72px 48px;\">\n    <div>\n      <div style=\"font-size:13px; font-weight:700; color:#f59e0b; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;\">Quién está detrás<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; color:#fff; margin:0 0 14px; letter-spacing:-0.01em;\">Creado por Ildefonso de Castro Parra<\u002Fh2>\n      <p style=\"font-size:15px; line-height:1.7; color:#c3cadb; margin:0 0 16px; max-width:640px;\">Más de 10 años de experiencia en consultoría y automatización de procesos con IA respaldan cada línea de código de ConstraCost. No es una app genérica: está pensada por quien también audita y monta, número a número, la cuenta de resultados de las empresas que la usan.<\u002Fp>\n      <p style=\"font-size:15px; line-height:1.7; color:#c3cadb; margin:0; max-width:640px;\">Esa mirada financiera es la que potencia tus resultados: puedes analizar y ver en tiempo real cómo está tu empresa, sin esperar al cierre de mes para saberlo.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CTA FINAL -->\n  <div style=\"border-top:1px solid rgba(255,255,255,0.06); background:linear-gradient(135deg, rgba(245,158,11,0.1), rgba(11,18,32,0));\">\n    <div style=\"max-width:900px; margin:0 auto; padding:72px 48px; text-align:center;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; color:#fff; margin:0 0 16px; letter-spacing:-0.01em;\">Hablemos de tu obra y tus números<\u002Fh2>\n      <p style=\"font-size:15.5px; color:#8592a8; margin:0 0 32px; line-height:1.6;\">Sin planes cerrados ni letra pequeña — te cuento cómo encajaría ConstraCost en tu día a día y cotizamos a medida.<\u002Fp>\n      <a href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:10px; background:#f59e0b; color:#0b1220; text-decoration:none; font-weight:700; font-size:16px; padding:16px 32px; border-radius:10px;\">\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#0b1220;\"><\u002Fspan> +34 656 646 888 · Escribir por WhatsApp\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"border-top:1px solid rgba(255,255,255,0.08); padding:28px 48px; display:flex; justify-content:space-between; align-items:center; max-width:1280px; margin:0 auto;\">\n    <div style=\"font-size:13px; color:#8592a8;\">© 2026 ConstraCost<\u002Fdiv>\n    <div style=\"display:flex; gap:20px; align-items:center;\">\n      <button onclick=\"{{ onOpenLegal }}\" style=\"font-size:13px; color:#8592a8; text-decoration:underline; background:none; border:none; cursor:pointer; font-family:inherit; padding:0;\">Aviso legal y privacidad<\u002Fbutton>\n      <div style=\"font-size:13px; color:#8592a8;\">ildedcp@gmail.com · Roquetas de Mar, Almería<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ legalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onCloseLegal }}\" style=\"position:fixed; inset:0; z-index:100; background:rgba(4,8,16,0.75); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:40px;\">\n      <div onclick=\"{{ onStopPropagation }}\" style=\"background:#0f1626; border:1px solid rgba(255,255,255,0.1); border-radius:20px; max-width:640px; width:100%; max-height:80vh; overflow-y:auto; padding:40px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px;\">\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; color:#fff; margin:0;\">Aviso legal, privacidad y cookies<\u002Fh2>\n          <button onclick=\"{{ onCloseLegal }}\" style=\"background:rgba(255,255,255,0.08); border:none; color:#eef2f8; width:32px; height:32px; border-radius:8px; font-size:16px; cursor:pointer;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; color:#fff; margin:0 0 10px;\">1. Aviso legal<\u002Fh3>\n        <p style=\"font-size:14px; line-height:1.7; color:#b7c0d1; margin:0 0 6px;\">En cumplimiento de la LSSI-CE:<\u002Fp>\n        <ul style=\"font-size:14px; line-height:1.85; color:#b7c0d1; margin:0 0 20px; padding-left:20px;\">\n          <li>Titular: Ildefonso de Castro Parra<\u002Fli>\n          <li>NIF/CIF: 26247022C<\u002Fli>\n          <li>Domicilio: Roquetas de Mar, Almería<\u002Fli>\n          <li>Contacto: ildedcp@gmail.com · +34 656 646 888<\u002Fli>\n        <\u002Ful>\n\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; color:#fff; margin:0 0 10px;\">2. Privacidad<\u002Fh3>\n        <p style=\"font-size:14px; line-height:1.7; color:#b7c0d1; margin:0 0 12px;\">Esta web no tiene formularios que recojan datos personales. El único punto de contacto es el enlace a WhatsApp: al pulsarlo abres tu propia app y decides qué datos compartes.<\u002Fp>\n        <p style=\"font-size:14px; line-height:1.7; color:#b7c0d1; margin:0 0 20px;\">Si nos escribes, tus datos se usan solo para responder tu consulta, conforme al RGPD y la LOPDGDD. Puedes ejercer tus derechos escribiendo a ildedcp@gmail.com.<\u002Fp>\n\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; color:#fff; margin:0 0 10px;\">3. Cookies<\u002Fh3>\n        <p style=\"font-size:14px; line-height:1.7; color:#b7c0d1; margin:0;\">Esta web no utiliza cookies propias ni de terceros, ni analítica ni publicidad.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1000}, &quot;whatsappNumber&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;34656646888&quot;, &quot;tsType&quot;: &quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { activeSection: null, legalOpen: false };\n\n  onOpenLegal = () => this.setState({ legalOpen: true });\n  onCloseLegal = () => this.setState({ legalOpen: false });\n  onStopPropagation = (e) => e.stopPropagation();\n\n  componentDidMount() {\n    const ids = ['como-funciona', 'funcionalidades', 'quien'];\n    this._observer = new IntersectionObserver(\n      (entries) => {\n        entries.forEach((entry) => {\n          if (entry.isIntersecting) {\n            this.setState({ activeSection: entry.target.id });\n          }\n        });\n      },\n      { rootMargin: '-45% 0px -45% 0px', threshold: 0 }\n    );\n    ids.forEach((id) => {\n      const el = document.getElementById(id);\n      if (el) this._observer.observe(el);\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._observer) this._observer.disconnect();\n  }\n\n  renderVals() {\n    const waNumber = this.props.whatsappNumber ?? '34656646888';\n    const active = this.state.activeSection;\n    const navColor = (id) => (active === id ? '#f59e0b' : '#b7c0d1');\n    const flowRaw = [\n      { emoji: '📐', title: 'Presupuesto de obra', desc: 'Cálculo del proyecto y partidas' },\n      { emoji: '🧱', title: 'Costes de partidas', desc: 'Materiales, mano de obra, subcontratas' },\n      { emoji: '💳', title: 'Tesorería', desc: 'Cobros y pagos en tiempo real' },\n      { emoji: '📊', title: 'Cuenta de resultados', desc: 'Margen por obra y consolidado' },\n    ];\n    const flow = flowRaw.map((f, i) => ({ ...f, hasArrow: i < flowRaw.length - 1 }));\n    return {\n      waLink: 'https://wa.me/' + waNumber,\n      legalOpen: this.state.legalOpen,\n      onOpenLegal: this.onOpenLegal,\n      onCloseLegal: this.onCloseLegal,\n      onStopPropagation: this.onStopPropagation,\n      navColorFuncionalidades: navColor('funcionalidades'),\n      navColorComoFunciona: navColor('como-funciona'),\n      navColorQuien: navColor('quien'),\n      flow,\n      pains: [\n        { emoji: '📄', text: 'Presupuestos en hojas sueltas que nunca cuadran con lo que realmente se gasta en obra.' },\n        { emoji: '🧮', text: 'Tesorería separada de la contabilidad — descubres el descuadre cuando ya es tarde.' },\n        { emoji: '⏰', text: 'No sabes si una obra deja margen real hasta que ya ha terminado.' },\n      ],\n      features: [\n        { title: 'Sincronización total', desc: 'Desde el cálculo inicial del proyecto hasta la cuenta de resultados, todo se actualiza en un mismo flujo — sin reintroducir datos.' },\n        { title: 'Control de tesorería', desc: 'Cobros, pagos y previsión de caja por obra, vinculados directamente a las partidas presupuestadas.' },\n        { title: 'Cuenta de resultados en tiempo real', desc: 'Margen por proyecto y consolidado de empresa actualizado con cada coste o cobro registrado.' },\n        { title: 'Pensado para PYMEs constructoras', desc: 'Sin módulos innecesarios ni curva de aprendizaje: lo justo para gestionar obras pequeñas y medianas sin depender de una gran implantación.' },\n      ],\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
